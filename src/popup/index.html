<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vega AI</title>
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 font-sans antialiased selection:bg-teal-100 selection:text-teal-900 flex flex-col">

  <!-- Sticky Header -->
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center cursor-default">
      <img src="../icons/logo.svg" width="28" height="28" class="w-7 h-7" alt="Vega AI">
      <h1 class="ml-2.5 text-base font-bold tracking-tight text-gray-900">
        vega <span class="font-normal text-teal-600">ai</span>
      </h1>
    </div>
    <button id="settings-btn" class="p-1.5 text-gray-400 hover:text-teal-600 hover:bg-teal-50 rounded-lg transition-all duration-200" title="Settings" aria-label="Settings">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 00-1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </button>
  </header>

  <main class="flex-1 overflow-y-auto flex flex-col px-4 py-5 gap-4">

    <div id="global-notification" class="hidden" role="alert" aria-live="polite"></div>

    <div id="status"></div>
    <div id="cta"></div>

    <!-- Capture View: form card + spacer + action buttons anchored at bottom -->
    <div id="capture-view" class="hidden flex-col gap-4 animate-slide-in">
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-3">
          <div class="p-1.5 bg-teal-50 rounded-lg flex-shrink-0">
            <svg class="w-4 h-4 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-gray-900">Capture Job</h3>
            <p class="text-xs text-gray-400">Save this listing to your tracker</p>
          </div>
        </div>
        <div class="px-4 py-4 space-y-4">
          <div>
            <label for="job-title" class="block text-sm font-medium text-gray-700 mb-1.5">
              Position / Title <span class="text-red-500">*</span>
            </label>
            <input type="text" id="job-title" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-all placeholder-gray-400" placeholder="e.g. Software Engineer">
          </div>
          <div>
            <label for="job-company" class="block text-sm font-medium text-gray-700 mb-1.5">
              Company <span class="text-red-500">*</span>
            </label>
            <input type="text" id="job-company" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-all placeholder-gray-400" placeholder="e.g. Google">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label for="job-location" class="block text-sm font-medium text-gray-700 mb-1.5">
                Location <span class="text-red-500">*</span>
              </label>
              <input type="text" id="job-location" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-all placeholder-gray-400" placeholder="e.g. Remote">
            </div>
            <div>
              <label for="job-type" class="block text-sm font-medium text-gray-700 mb-1.5">Job Type</label>
              <select id="job-type" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all appearance-none">
                <option value="full_time">Full-time</option>
                <option value="part_time">Part-time</option>
                <option value="contract">Contract</option>
                <option value="intern">Internship</option>
                <option value="freelance">Freelance</option>
                <option value="remote">Remote</option>
              </select>
            </div>
          </div>
          <div>
            <label for="job-description" class="block text-sm font-medium text-gray-700 mb-1.5">
              Job Description <span class="text-red-500">*</span>
            </label>
            <textarea id="job-description" rows="4" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-all placeholder-gray-400 resize-none" placeholder="Paste the job description here..."></textarea>
          </div>
          <div>
            <label for="job-notes" class="block text-sm font-medium text-gray-700 mb-1.5">Personal Notes</label>
            <textarea id="job-notes" rows="2" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-all placeholder-gray-400 resize-none" placeholder="Add any thoughts..."></textarea>
          </div>
        </div>
      </div>

      <!-- Spacer pushes buttons to bottom -->
      <div class="flex-1"></div>

      <div class="space-y-2">
        <button id="save-job-btn" class="w-full py-2.5 bg-teal-600 hover:bg-teal-700 text-white rounded-xl transition-all duration-200 text-sm font-medium shadow-sm hover:shadow">
          Save
        </button>
        <button id="cancel-capture-btn" class="w-full py-2.5 bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl transition-all duration-200 text-sm font-medium">
          Cancel
        </button>
      </div>
    </div>

    <!-- Settings View: back + mode card + spacer + action buttons anchored at bottom -->
    <div id="settings-view" class="hidden flex-col gap-4 animate-slide-in">
      <button id="back-btn" class="flex items-center text-sm font-medium text-gray-500 hover:text-teal-600 transition-colors -ml-1 p-1 self-start">
        <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back
      </button>

      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-3">
          <div class="p-1.5 bg-teal-50 rounded-lg flex-shrink-0">
            <svg class="w-4 h-4 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
            </svg>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-gray-900">Settings</h3>
            <p class="text-xs text-gray-400">Backend connection</p>
          </div>
        </div>
        <div class="px-4 py-4 space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Backend Mode</label>
            <div class="space-y-2">
              <label class="flex items-center p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition-all has-[:checked]:border-teal-500 has-[:checked]:bg-teal-50/40">
                <input type="radio" name="backend-mode" value="cloud" id="backend-cloud" class="w-4 h-4 text-teal-600 border-gray-300 focus:ring-teal-500">
                <div class="ml-3">
                  <div class="text-sm font-medium text-gray-900">Cloud Mode</div>
                  <div class="text-xs text-gray-400">benidevo.com</div>
                </div>
              </label>
              <label class="flex items-center p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition-all has-[:checked]:border-teal-500 has-[:checked]:bg-teal-50/40">
                <input type="radio" name="backend-mode" value="local" id="backend-local" class="w-4 h-4 text-teal-600 border-gray-300 focus:ring-teal-500">
                <div class="ml-3">
                  <div class="text-sm font-medium text-gray-900">Local Mode</div>
                  <div class="text-xs text-gray-400">Custom host</div>
                </div>
              </label>
            </div>
          </div>

          <div id="local-backend-settings" class="hidden space-y-4 animate-fade-in">
            <div>
              <label for="custom-scheme" class="block text-sm font-medium text-gray-700 mb-1.5">Protocol</label>
              <select id="custom-scheme" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all appearance-none">
                <option value="http">HTTP</option>
                <option value="https">HTTPS</option>
              </select>
            </div>
            <div>
              <label for="custom-host" class="block text-sm font-medium text-gray-700 mb-1.5">Host Address</label>
              <input type="text" id="custom-host" placeholder="localhost:8765" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-all placeholder-gray-400">
              <div id="host-error" class="hidden mt-1.5 text-xs text-red-500"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Spacer pushes buttons to bottom -->
      <div class="flex-1"></div>

      <div class="space-y-2">
        <button id="test-connection-btn" class="w-full py-2.5 bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl transition-all duration-200 text-sm font-medium">
          Test Connection
        </button>
        <button id="save-settings-btn" class="w-full py-2.5 bg-teal-600 hover:bg-teal-700 text-white rounded-xl transition-all duration-200 text-sm font-medium shadow-sm hover:shadow">
          Save Settings
        </button>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="flex-shrink-0 px-4 py-3 border-t border-gray-100 bg-white">
    <div class="flex items-center justify-between text-xs text-gray-400">
      <span id="version-display">v1.2.2</span>
      <button id="check-updates-btn" class="hover:text-teal-600 transition-colors flex items-center group">
        <span id="update-text">Check for updates</span>
        <svg class="w-3 h-3 ml-1 group-hover:rotate-180 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
    </div>
    <div id="update-status" class="hidden mt-2 animate-fade-in">
      <div id="update-message" class="text-center py-1 rounded-lg text-xs font-medium"></div>
    </div>
  </footer>

  <script src="index.js"></script>
</body>
</html>
