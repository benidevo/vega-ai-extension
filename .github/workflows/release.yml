name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag_name || github.ref }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build extension
      run: npm run build

    - name: Create release zip
      env:
        RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
      run: |
        cd dist
        zip -r "../vega-extension-${RELEASE_TAG}.zip" .
        cd ..

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag_name || github.ref_name }}
        files: vega-extension-${{ inputs.tag_name || github.ref_name }}.zip
        generate_release_notes: true
        body: |
          ## Vega AI Job Capture ${{ inputs.tag_name || github.ref_name }}

          ### 📥 Installation Instructions

          **Download the extension ZIP file from the assets below**

          ### 💻 How to Install

          1. Download the attached `vega-extension-*.zip` file.
          2. Unzip the file to a folder on your computer.
          3. Open Chrome and go to `chrome://extensions/`.
          4. Turn on "Developer mode" (toggle in top right).
          5. Click "Load unpacked" and select your unzipped folder.

          ### 🆕 What's Changed

          See the auto-generated release notes below for detailed changes.
